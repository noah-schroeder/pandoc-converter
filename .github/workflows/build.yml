name: Build installers

# On every push to main, checks the version in package.json. If that version
# hasn't been released yet (no matching vX.Y.Z tag), it builds the installers for
# Windows, macOS (Apple Silicon), and Linux and publishes a GitHub Release with
# notes taken from CHANGELOG.md. A push that doesn't change the version does
# nothing expensive. You can also run it manually from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---- Decide whether this commit should produce a release -----------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # need existing tags to tell if this version shipped
      - id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION already released — building nothing."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION is new — will build and release."
          fi

  # ---- Build installers (only when releasing, or when run manually) --------
  build:
    needs: version
    if: needs.version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (x64)
            os: windows-latest
            dist: dist:win
          - name: macOS (Apple Silicon)
            os: macos-latest      # arm64 runner
            dist: dist:mac
          - name: Linux (x64)
            os: ubuntu-latest
            dist: dist:linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle pandoc for this OS
        run: npm run fetch-pandoc

      - name: Build installer
        run: npm run ${{ matrix.dist }}

      # Collect just the user-facing installers (skip unpacked dirs, blockmaps, etc.)
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # ---- Tag + publish the GitHub Release with changelog notes ---------------
  release:
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { f=1; print; next }
            /^## \[/ { f=0 }
            f
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release v$VERSION" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: artifacts/**/*
